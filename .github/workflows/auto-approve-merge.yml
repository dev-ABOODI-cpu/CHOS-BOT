name: القبول والدمج التلقائي لطلبات السحب (Auto Approve and Merge PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  repository-projects: read

jobs:
  approve-and-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'neoxr'
    
    steps:
      - name: توليد رمز تطبيق جيت هاب (Generate GitHub App Token)
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: سحب الكود الحالي (Checkout code)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: تحديث عنوان ووصف طلب السحب ذكياً (Update PR Title and Body)
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          # جلب الفروقات البرمجية لطلب السحب الحاضر
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} | head -c 3000)
          
          if [ -n "$DIFF" ]; then
            # إرسال الفروقات إلى واجهة المراجعة والتنقيح
            RESPONSE=$(curl -s -X POST "https://xorasync-ai.hf.space/api/revisi" \
              --data-urlencode "prompt=$DIFF" \
              --data-urlencode "apikey=${{ secrets.NEOXR_API_KEY }}")
            
            # استخراج النص المولد من رد الـ API
            CONTENT=$(echo "$RESPONSE" | jq -r '.data.message')
            
            # التحقق من صحة المحتوى لتطبيق التعديلات على طلب السحب
            if [ -n "$CONTENT" ] && [ "$CONTENT" != "null" ]; then
              # السطر الأول يتم اعتماده كعنوان للـ PR
              TITLE=$(echo "$CONTENT" | head -n 1)
              
              # بقية النص يتم اعتماده كوصف ومتن للطلب
              echo "$CONTENT" | tail -n +3 > pr_body.txt
              
              if [ ! -s pr_body.txt ]; then
                 echo "$CONTENT" | tail -n +2 > pr_body.txt
              fi

              # تطبيق التعديلات الذكية على الـ PR
              gh pr edit ${{ github.event.pull_request.number }} --title "$TITLE" --body-file pr_body.txt
            fi
          fi

      - name: مراجعة الكود بالذكاء الاصطناعي (AI Code Review)
        id: ai-review
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} | head -c 3000)
          
          if [ -z "$DIFF" ]; then
            MESSAGE="✅ تم القبول تلقائياً (لم يتم رصد أي تغييرات في الأكواد البرمجية)."
          else
            RESPONSE=$(curl -s -X POST "https://xorasync-ai.hf.space/api/review" \
              --data-urlencode "prompt=$DIFF" \
              --data-urlencode "apikey=${{ secrets.NEOXR_API_KEY }}")
            
            MESSAGE=$(echo "$RESPONSE" | jq -r '.data.message // "✅ تم القبول والموافقة التلقائية"')
          fi
          
          {
            echo "AI_COMMENT<<EOF"
            echo "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: الموافقة الرسمية على طلب السحب (Approve PR)
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          COMMENT_BODY: ${{ env.AI_COMMENT }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve -b "$COMMENT_BODY"

      - name: دمج طلب السحب وحذف الفرع (Merge PR)
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
