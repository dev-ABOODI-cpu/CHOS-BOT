name: نظام التنبيه والتحقق من المشاكل الجديدة (New Issue Notifier)

on:
  issues:
    types: [opened]

jobs:
  notify-neoxr:
    runs-on: ubuntu-latest
    steps:
      - name: توليد رمز تطبيق جيت هاب (Generate GitHub App Token)
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: فحص ورصد المشاكل المكررة تلقائياً (Detect duplicate issues)
        id: detect-duplicate
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const issue = context.payload.issue
            const title = issue.title.toLowerCase().trim()
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            })

            // دافة حساب مسافة ليفنشتاين لتقييم تشابه النصوص
            function levenshtein(a, b) {
              const m = a.length
              const n = b.length
              const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0))
              for (let i = 0; i <= m; i++) dp[i][0] = i
              for (let j = 0; j <= n; j++) dp[0][j] = j
              for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                  const cost = a[i - 1] === b[j - 1] ? 0 : 1
                  dp[i][j] = Math.min(
                    dp[i - 1][j] + 1,
                    dp[i][j - 1] + 1,
                    dp[i - 1][j - 1] + cost
                  )
                }
              }
              return dp[m][n]
            }

            function similarity(a, b) {
              const distance = levenshtein(a, b)
              const maxLen = Math.max(a.length, b.length)
              return maxLen === 0 ? 1 : 1 - distance / maxLen
            }

            let duplicate = null
            for (const i of issues) {
              if (i.number === issue.number) continue
              const sim = similarity(i.title.toLowerCase().trim(), title)
              if (sim >= 0.9) {
                duplicate = i
                break
              }
            }

            // إذا تم العثور على تذكرة مطابقة، يتم إغلاق التذكرة الجديدة تلقائياً لمنع التكرار
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `⚠️ تنبيه النظام: تم رصد هذا البلاغ كنسخة مكررة من التذكرة السابقة رقم #${duplicate.number}.`
              })

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['duplicate']
              })

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              })

              core.setOutput('is_duplicate', 'true')
            } else {
              core.setOutput('is_duplicate', 'false')
            }

      - name: إرسال رد ترحيبي على المشاكل الجديدة المقبولة (Comment on new issue)
        if: steps.detect-duplicate.outputs.is_duplicate == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const issue = context.payload.issue
            const message = `
            مرحباً @${issue.user.login} 👋

            نشكرك على إرسال التقرير: **${issue.title}** لقد تم تحويل تفاصيل هذا البلاغ بنجاح إلى المطور عبر الواتساب وسيتم مراجعته وفحصه في أقرب وقت ممكن.

            > [!NOTE]
            > يرجى التحقق دائماً من المشاكل داخل [مستودع Baileys الرسمي](https://github.com/WhiskeySockets/Baileys/issues) أولاً للتأكد مما إذا كانت المشكلة ناتجة عن السكريبت نفسه أو من مكتبة Baileys الأساسية لتسهيل الحل.
            `
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: message
            })
